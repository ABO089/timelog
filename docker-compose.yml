services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - DB_PATH=/data/timelog.db
    volumes:
      - timelog_data:/data
      - whisper_models:/app/whisper_models
    ports:
      - "8011:8010"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3010:3010"
    depends_on:
      - backend

volumes:
  timelog_data:
  whisper_models:
